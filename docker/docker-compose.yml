services:
  db:
    image: postgres:16-alpine
    container_name: price_tracker_db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: price_tracker_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes

  api:
    image: price_tracker_api
    container_name: price_tracker_api
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: always
    ports:
      - "5001:8080"
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Default: Host=db;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      ConnectionStrings__Redis: redis:6379
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: SmartPriceTracker
      Jwt__Audience: SmartPriceTrackerUsers
      InternalApi__Key: ${INTERNAL_API_KEY}
      Hangfire__DashboardApiKey: ${HANGFIRE_DASHBOARD_API_KEY}
      AllowedHosts: ${ALLOWED_HOSTS}
      Frontend__BaseUrl: ${FRONTEND_BASE_URL}
      Cors__AllowedOrigins__0: ${CORS_ALLOWED_ORIGIN}
      Smtp__Host: ${SMTP_HOST}
      Smtp__Port: ${SMTP_PORT:-587}
      Smtp__SecureSocketOptions: StartTls
      Smtp__Username: ${SMTP_USERNAME}
      Smtp__Password: ${SMTP_PASSWORD}
      Smtp__From: ${SMTP_FROM}
      Smtp__FromName: Smart Price Tracker
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started

  frontend:
    image: price_tracker_frontend
    container_name: price_tracker_frontend
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    restart: always
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy

  scraper:
    image: price_tracker_scraper
    container_name: price_tracker_scraper
    build:
      context: ..
      dockerfile: docker/Dockerfile.scraper
    restart: always
    env_file:
      - .env
    environment:
      Api__BaseUrl: http://api:8080
      Api__InternalKey: ${INTERNAL_API_KEY}
      Scraper__IntervalMinutes: 15
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
