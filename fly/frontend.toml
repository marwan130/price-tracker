# Fly.io config for the frontend. Create the app first:
#   fly apps create pricetracker-web
# Set build arg to your API public URL, then deploy from repo root:
#   fly deploy -c fly/frontend.toml --build-arg VITE_API_URL=https://pricetracker-api.fly.dev

app = 'pricetracker-web'
primary_region = 'ams'

[build]
  dockerfile = 'docker/Dockerfile.frontend'
  [build.args]
    VITE_API_URL = 'https://pricetracker-api.fly.dev'

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
