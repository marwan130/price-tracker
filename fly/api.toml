# Fly.io config for the API. Create the app first:
#   fly apps create pricetracker-api
# Deploy from repo root:
#   fly deploy -c fly/api.toml

app = 'pricetracker-api'
primary_region = 'ams'

[build]
  dockerfile = 'docker/Dockerfile'

[env]
  ASPNETCORE_ENVIRONMENT = 'Production'
  ASPNETCORE_URLS = 'http://+:8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '45s'
    method = 'GET'
    path = '/health/ready'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
